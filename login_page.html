<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusFleet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/49a9d9059e.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop>
            <source src="assets/bg-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="blur-overlay"></div>
    </div>
    <div class="container-fluid h-100">
        <div class="row">
            <header class="mb-4 d-flex justify-content-between align-items-center">
                <img class="nav-logo" src="assets/logo-no-background.png" alt="NexusFleet Logo">
                <button class="partner-login-btn btn">Partner Login</button>
            </header>
        </div>
        <div class="row">
            <div class="col-12 d-flex flex-column justify-content-center align-items-center">
                <div id="customerLogin" class="login-container text-center">
                    <h1 class="heading mb-4">Customer Login</h1>
                    <form class="text-left px-4" id="customerLoginForm">
                        <div class="form-group mb-3">
                            <label class="label">Username</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter your username">
                        </div>
                        <div class="form-group mb-3">
                            <label class="label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password">
                        </div>
                        <a class="linker" href="">Sign Up Here!</a>
                        <hr>
                        <button type="submit" class="btn btn-primary w-100">Login <i class="fa-solid fa-arrow-right ms-2"></i></button>
                    </form>
                    <p id="loginError" class="text-danger mt-2" style="display: none;">Incorrect username or password.</p>
                </div>
                
                <div id="partnerLogin" class="login-container text-center" style="display: none;">
                    <h1 class="heading mb-4">Partner Login</h1>
                    <form class="text-left px-4">
                        <div class="form-group mb-3">
                            <label class="label">Partner ID</label>
                            <input type="text" class="form-control" placeholder="Enter your partner ID">
                        </div>
                        <div class="form-group mb-3">
                            <label class="label">Password</label>
                            <input type="password" class="form-control" placeholder="Enter your password">
                        </div>
                        <a class="linker" href="">Sign Up Here!</a>
                        <hr>
                        <button class="btn btn-primary w-100">Login <i class="fa-solid fa-arrow-right ms-2"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
