<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusFleet - Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            font-family: Arial, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Video background and blur overlay */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .video-background video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .blur-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 0;
        }

        .payment-container {
            z-index: 1;
            position: relative;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: 50px auto;
        }

        h2 {
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-label {
            font-weight: 500;
        }

        .form-control {
            margin-bottom: 15px;
        }

        .btn-primary {
            width: 100%;
            background-color: #007BFF;
            color: white;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .total-price-container {
            margin: 20px 0;
            font-size: 1.2rem;
        }

        .price {
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop>
            <source src="assets/bg-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="blur-overlay"></div>
    </div>

    <div class="payment-container">
        <img class="nav-logo mb-4" src="assets/logo-no-background.png" alt="NexusFleet Logo" style="display: block; margin: 0 auto; height: 80px;">
        <h2>Product Payment</h2>

        <!-- Product Details Form -->
        <form id="paymentForm">
            <div class="mb-3">
                <label for="productWeight" class="form-label">Product Weight (kg)</label>
                <input type="number" class="form-control" id="productWeight" placeholder="Enter product weight" required>
            </div>

            <div class="mb-3">
                <label for="productSize" class="form-label">Product Size (L x W x H in cm)</label>
                <input type="text" class="form-control" id="productSize" placeholder="Enter product dimensions (e.g., 30 x 20 x 15)" required>
            </div>

            <div class="mb-3">
                <label for="shippingDistance" class="form-label">Shipping Distance (km)</label>
                <input type="number" class="form-control" id="shippingDistance" placeholder="Enter shipping distance" required>
            </div>

            <div class="mb-3">
                <label for="deliverySpeed" class="form-label">Delivery Speed</label>
                <select class="form-control" id="deliverySpeed" required>
                    <option value="standard">Standard (3-5 days)</option>
                    <option value="express">Express (1-2 days)</option>
                </select>
            </div>

            <!-- Total Price Section -->
            <div class="total-price-container">
                <span>Total Price: <span class="price" id="totalPrice">₹0.00</span></span>
            </div>

            <button type="submit" class="btn btn-primary">Proceed to Payment</button>
        </form>
    </div>

    <script>
        const weightPriceRate = 50;  // Price per kg
        const distancePriceRate = 2; // Price per km
        const expressDeliveryMultiplier = 1.5; // Express delivery is 50% more expensive

        // Function to calculate total price
        function calculatePrice() {
            const productWeight = parseFloat(document.getElementById('productWeight').value) || 0;
            const shippingDistance = parseFloat(document.getElementById('shippingDistance').value) || 0;
            const deliverySpeed = document.getElementById('deliverySpeed').value;

            let totalPrice = (productWeight * weightPriceRate) + (shippingDistance * distancePriceRate);

            // Apply multiplier if express delivery is chosen
            if (deliverySpeed === 'express') {
                totalPrice *= expressDeliveryMultiplier;
            }

            // Update total price in the UI
            document.getElementById('totalPrice').innerText = `₹${totalPrice.toFixed(2)}`;
        }

        // Add event listeners to update the price whenever inputs change
        document.getElementById('productWeight').addEventListener('input', calculatePrice);
        document.getElementById('shippingDistance').addEventListener('input', calculatePrice);
        document.getElementById('deliverySpeed').addEventListener('change', calculatePrice);

        // Handle form submission
        document.getElementById('paymentForm').addEventListener('submit', function (event) {
            event.preventDefault();
            alert('Payment processed successfully!');
        });
    </script>
</body>
</html>
