<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusFleet Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/49a9d9059e.js" crossorigin="anonymous"></script>

    <style>
        /* General Body and Background */
        body, html {
            height: 100%;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }

        .video-background {
            position: fixed; /* Fixed position to stay in the background */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Hide overflow */
            z-index: -1; /* Ensure it stays behind the content */
            }

        .video-background video {
            min-width: 100%; /* Ensures the video covers the full width */
            min-height: 100%; /* Ensures the video covers the full height */
            width: auto;
            height: auto;
            position: absolute; /* Allows for proper positioning */
            top: 50%; /* Centers the video */
            left: 50%; /* Centers the video */
            transform: translate(-50%, -50%); /* Centers the video */
            }

            /* Overlay for blur effect */
        .blur-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Dark overlay for better contrast */
            backdrop-filter: blur(8px); /* Apply blur effect */
            z-index: 0; /* Make sure it is on top of the video but behind content */
            }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.7);
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 50px;
            box-shadow: 4px 0px 10px rgba(0, 0, 0, 0.5);
        }

        .sidebar img {
            width: 120px;
            margin: 0 auto;
            display: block;
        }

        .nav-link {
            color: #fff;
            padding: 15px 20px;
            font-size: 16px;
            text-transform: uppercase;
            transition: background-color 0.3s ease, transform 0.2s ease;
            display: block;
        }

        .nav-link:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .nav-link.active {
            background-color: #007bff;
        }

        .main-content {
            margin-left: 280px;
            padding: 20px;
        }

        .section-heading {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 600;
            color: #fff;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            color: #fff;
            margin-bottom: 30px;
        }

        .card-body {
            padding: 20px;
        }

        .btn {
            background-color: #007BFF;
            border: none;
            color: white;
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .progress-bar {
            background-color: #28a745;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .main-content {
                margin-left: 0;
            }

            .section-heading {
                font-size: 20px;
            }

            .card {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Video Background and Overlay -->
    <div class="video-background">
        <video autoplay muted loop>
            <source src="assets/bg-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="blur-overlay"></div> <!-- Apply the blur effect here -->
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="d-flex flex-column align-items-center">
            <img src="assets/logo-no-background.png" alt="NexusFleet Logo">
            <ul class="nav flex-column w-100">
                <li class="nav-item">
                    <a class="nav-link active" href="#current-order">Current Order</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#past-orders">Past Orders</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="payments.html">Book New Order</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#profile">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="about.html">About NexusFleet</a>
                </li>
            </ul>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Current Order Status Section -->
        <section id="current-order">
            <h2 class="section-heading">Current Order Status</h2>
            <div class="card">
                <div class="card-body">
                    <div class="progress">
                        <div class="progress-bar" role="progressbar" style="width: 50%;" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">In Transit</div>
                    </div>
                    <p class="mt-3">Expected Delivery Date: <strong>28th October</strong></p>
                </div>
            </div>
        </section>

        <!-- Past Orders Section -->
        <section id="past-orders">
            <h2 class="section-heading">Past Orders</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Product Name</h5>
                            <p class="card-text">Delivered on 10th Oct</p>
                            <button class="btn">Reorder</button>
                        </div>
                    </div>
                </div>
                <!-- Add more orders here -->
            </div>
        </section>

        <!-- Book New Order Section -->
        <section id="book-new-order">
            <h2 class="section-heading">Book a New Order</h2>
            <form id="newOrderForm">
                <div class="mb-3">
                    <label for="productDetails" class="form-label">Product Details</label>
                    <textarea class="form-control" id="productDetails" rows="3" placeholder="Enter product details"></textarea>
                </div>
                <div class="mb-3">
                    <label for="deliveryAddress" class="form-label">Delivery Address</label>
                    <textarea class="form-control" id="deliveryAddress" rows="2" placeholder="Enter delivery address"></textarea>
                </div>
                <button type="submit" class="btn btn-success">Submit Order</button>
            </form>
        </section>

        <!-- Profile Section -->
        <section id="profile">
            <h2 class="section-heading">Profile</h2>
            <form>
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="John Doe">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="johndoe@example.com">
                </div>
                <button type="submit" class="btn btn-primary">Update Profile</button>
            </form>
        </section>
    </main>

    <!-- Form submission script -->
    <script>
        document.getElementById('newOrderForm').addEventListener('submit', function (event) {
            event.preventDefault();
            alert('New Order Submitted!');
        });
    </script>
</body>
</html>
