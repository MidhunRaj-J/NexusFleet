<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Order - NexusFleet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Video background and blur overlay */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .video-background video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .blur-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 0;
        }

        /* General body styling */
        body {
            margin: 0;
            background-color: rgb(50, 37, 37);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Order form container */
        /* Reduced width for the form container */
/* Reduced padding and adjusted spacing to reduce height */
.order-form-container {
    font-family: "Roboto", sans-serif;
    color: white;
    background-image: linear-gradient(135deg, #1F1A20, #6A707E, #536493);
    position: relative;
    z-index: 1;
    padding: 20px; /* Reduced padding */
    width: 350px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}

/* Adjusted heading size and spacing */
.heading {
    font-size: 1.8rem; /* Reduced font size */
    margin-bottom: 10px; /* Reduced margin to decrease height */
    text-align: center;
    font-weight: bold;
}

/* Reduced form control padding and margin */
.form-control {
    background-color: #2E2B33;
    border: none;
    color: white;
    padding: 8px; /* Reduced padding */
    border-radius: 8px;
    font-size: 14px; /* Slightly smaller font size */
}

.form-group {
    margin-bottom: 10px; /* Reduced space between inputs */
}

/* Submit button adjustments */
.btn-submit {
    background-color: #007BFF;
    color: white;
    padding: 10px 15px; /* Reduced padding */
    width: 100%;
    font-size: 16px; /* Slightly smaller font */
    border-radius: 8px;
    transition: background-color 0.3s;
}

        .btn-submit:hover {
            background-color: #0056b3;
        }

        .logo {
            height: 100px;
            display: block;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop>
            <source src="assets/bg-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="blur-overlay"></div>
    </div>

    <div class="order-form-container">
        <img class="logo" src="assets/logo-no-background.png" alt="NexusFleet Logo">
        <h1 class="heading">Book Your Order</h1>
        <form id="orderForm">
            <div class="form-group mb-3">
                <label class="label">Full Name</label>
                <input type="text" class="form-control" id="customerName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group mb-3">
                <label class="label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group mb-3">
                <label class="label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" required>
            </div>
            <div class="form-group mb-3">
                <label class="label">Delivery Address</label>
                <textarea class="form-control" id="deliveryAddress" rows="3" placeholder="Enter delivery address" required></textarea>
            </div>
            <div class="form-group mb-3">
                <label class="label">Product Details</label>
                <textarea class="form-control" id="productDetails" rows="3" placeholder="Enter product details" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Submit Order</button>
        </form>
    </div>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const customerName = document.getElementById('customerName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const deliveryAddress = document.getElementById('deliveryAddress').value;
            const productDetails = document.getElementById('productDetails').value;
            const deliveryTime = document.getElementById('deliveryTime').value;
            const additionalNotes = document.getElementById('additionalNotes').value;

            // For now, just log the data. You can integrate backend later to handle the order.
            console.log({
                customerName, 
                email, 
                phone, 
                deliveryAddress, 
                productDetails, 
                deliveryTime, 
                additionalNotes
            });

            alert('Order submitted successfully!');
        });
    </script>
</body>
</html>
